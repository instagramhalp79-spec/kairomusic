name: kairo
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  youtube_player_flutter: ^9.0.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  file_picker: ^8.0.3
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_video_progress_bar: ^2.0.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Added package for launcher icons
  flutter_launcher_icons: ^0.13.1

# Configuration for flutter_launcher_icons
flutter_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/logo.png" 

flutter:
  uses-material-design: true
  assets:
    - assets/
